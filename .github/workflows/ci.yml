name: CI - Monitoring Stack

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validar docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

      - name: Lint da configuração do Prometheus
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v ${{ github.workspace }}/prometheus.yml:/etc/prometheus/prometheus.yml \
            prom/prometheus \
            check config /etc/prometheus/prometheus.yml

      - name: Subir stack e verificar saúde
        run: |
          docker compose -f docker-compose.yml up -d
          sleep 10
          curl --fail http://localhost:9090/-/healthy
          curl --fail http://localhost:3000/api/health
          docker compose down